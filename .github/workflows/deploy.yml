name: Build WordPress Image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Required for OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY: abdu-wordpress
    
    steps:
      - name: Checkout WordPress code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-WordPressBuild
      
      - name: Verify AWS Identity
        run: |
          echo "🔐 Verifying AWS credentials..."
          aws sts get-caller-identity
          echo "✅ AWS authentication successful"
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "🐳 Building Docker image..."
          echo "Image will be: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          
          # Build the Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          # Also tag as latest
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "📦 Pushing image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "✅ Image pushed successfully"
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV
      
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.KUSTOMIZE_REPO }}
          ref: main
          token: ${{ secrets.GH_PAT }}
          path: infra-repo  

      # 2. Update the image tag
      - name: Update Kustomize image tag
        env:
          IMAGE_TAG: ${{ github.sha }}
        # Added 'k8s-manifests' to the path below
        working-directory: ./infra-repo/k8s-manifests/overlays/prod 
        run: |
          echo "📝 Updating kustomization.yaml with new image tag..."
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" kustomization.yaml
          cat kustomization.yaml

      - name: Commit and push Kustomize changes
        env:
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./infra-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ensure the path to git add is also correct
          git add k8s-manifests/overlays/prod/kustomization.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Update WordPress image to ${IMAGE_TAG}"
            git push origin main
          fi
      
      - name: Cleanup old ECR images
        if: success()
        run: |
          echo "🧹 Cleaning up old ECR images (keeping last 10)..."
          
          # Get image digests sorted by push date, skip the first 10 (most recent)
          IMAGES_TO_DELETE=$(aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --region $AWS_REGION \
            --query 'sort_by(imageDetails,& imagePushedAt)[:-10].imageDigest' \
            --output text)
          
          if [ -n "$IMAGES_TO_DELETE" ]; then
            for digest in $IMAGES_TO_DELETE; do
              echo "Deleting image: $digest"
              aws ecr batch-delete-image \
                --repository-name $ECR_REPOSITORY \
                --region $AWS_REGION \
                --image-ids imageDigest=$digest || true
            done
            echo "✅ Old images cleaned up"
          else
            echo "ℹ️  No old images to delete"
          fi
      
      - name: Create deployment summary
        if: always()
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "## 🐳 WordPress Image Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "**ECR Repository:** \`${ECR_REGISTRY}/${ECR_REPOSITORY}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "### ✅ Deployment Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. Image built and pushed to ECR" >> $GITHUB_STEP_SUMMARY
            echo "2. Kustomize manifests updated in k8s-manifests repository" >> $GITHUB_STEP_SUMMARY
            echo "3. ArgoCD will automatically sync and deploy" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Full Image URI:** \`${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          fi
